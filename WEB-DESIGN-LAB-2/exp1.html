<html>
<head>
<title>4 Sections</title>
<style>
.container {
    display: grid;
    grid-template-columns: 50% 50%;
    grid-template-rows: 50vh 50vh;
}
.box {
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
#b1 { background-color: red; }
#b2 { background-color: blue; }
#b3 { background-color: green; }
#b4 { background-color: purple; }
</style>
</head>

<body>

<div class="container">
    <div class="box" id="b1"><h1>Section 1</h1></div>
    <div class="box" id="b2"><h1>Section 2</h1></div>
    <div class="box" id="b3"><h1>Section 3</h1></div>
    <div class="box" id="b4"><h1>Section 4</h1></div>
</div>

</body>
</html>
