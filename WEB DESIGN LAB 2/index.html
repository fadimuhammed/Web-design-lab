<!DOCTYPE html>
<html>
<head>
<title>Web Lab Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

header p {
    color: #94a3b8;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARDS */
.card {
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1e293b, #334155);
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    top: 0;
    left: -100%;
    transition: 0.5s;
}

.card:hover::before {
    left: 100%;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    color: #cbd5f5;
}

/* LINK RESET */
a {
    text-decoration: none;
    color: white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #94a3b8;
}
</style>

</head>

<body>

<header>
    <h1>💻 Web Designing Lab</h1>
    <p>Interactive Experiment Dashboard</p>
</header>

<div class="container">

    <a href="exp1.html">
        <div class="card">
            <h2>Experiment 1</h2>
            <p>4 Section Layout using DIV</p>
        </div>
    </a>

    <a href="exp2.html">
        <div class="card">
            <h2>Experiment 2</h2>
            <p>Student Profile Page</p>
        </div>
    </a>

    <a href="exp3.html">
        <div class="card">
            <h2>Experiment 3</h2>
            <p>College Homepage Design</p>
        </div>
    </a>

    <a href="exp4.html">
        <div class="card">
            <h2>Experiment 4</h2>
            <p>Photo Gallery Grid</p>
        </div>
    </a>

    <a href="exp5.html">
        <div class="card">
            <h2>Experiment 5</h2>
            <p>JavaScript Calculator</p>
        </div>
    </a>

</div>

<footer>
    <p>Submitted by: Fadi Muhammed</p>
</footer>

</body>
</html>
