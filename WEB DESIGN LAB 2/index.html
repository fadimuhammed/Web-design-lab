<!DOCTYPE html>
<html>
<head>
<title>Web Lab Experiments</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #141e30, #243b55);
    margin: 0;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.3);
}

h1 {
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

a {
    text-decoration: none;
    color: white;
}

footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<header>
    <h1>Web Designing Lab</h1>
    <p>Experiment Dashboard</p>
</header>

<div class="container">

    <a href="exp1.html">
        <div class="card">
            <h2>Experiment 1</h2>
            <p>4 Section Layout using DIV</p>
        </div>
    </a>

    <a href="exp2.html">
        <div class="card">
            <h2>Experiment 2</h2>
            <p>Student Profile Page</p>
        </div>
    </a>

    <a href="exp3.html">
        <div class="card">
            <h2>Experiment 3</h2>
            <p>College Homepage</p>
        </div>
    </a>

    <a href="exp4.html">
        <div class="card">
            <h2>Experiment 4</h2>
            <p>Photo Gallery Grid</p>
        </div>
    </a>

    <a href="exp5.html">
        <div class="card">
            <h2>Experiment 5</h2>
            <p>JavaScript Calculator</p>
        </div>
    </a>

</div>

<footer>
    <p>Submitted by: Fadi Muhammed</p>
</footer>

</body>
</html>
